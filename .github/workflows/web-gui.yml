name: Web GUI

on:
  push:
    paths:
      - 'sniff-web/web_server.py'
      - 'sniff-web/tests/integration_tests/test_web_*.py'
      - 'sniff-web/requirements-web.txt'
      - 'sniff-web/web/**'
      - 'sniff-web/.github/workflows/web-gui.yml'
      - '.github/workflows/web-gui.yml'
  pull_request:
    paths:
      - 'sniff-web/web_server.py'
      - 'sniff-web/tests/integration_tests/test_web_*.py'
      - 'sniff-web/requirements-web.txt'
      - 'sniff-web/web/**'
      - 'sniff-web/.github/workflows/web-gui.yml'
      - '.github/workflows/web-gui.yml'

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev tcpdump
      - name: Install Python deps
        run: |
          pip install --break-system-packages -r requirements.txt -r sniff-web/requirements-web.txt
      - name: Run sniff-web backend tests
        run: |
          cd sniff-web && pytest tests/integration_tests/ -v
      - name: Run pre-existing tests (regression check)
        run: |
          pytest tests/integration_tests/ -v

  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install npm deps
        working-directory: sniff-web/web
        run: npm ci
      - name: Typecheck
        working-directory: sniff-web/web
        run: npx tsc --noEmit
      - name: Build
        working-directory: sniff-web/web
        run: npm run build
      - name: Vitest unit tests
        working-directory: sniff-web/web
        run: npm test
