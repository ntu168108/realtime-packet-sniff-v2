name: Web GUI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (py-${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev tcpdump
      - name: Install Python deps
        run: |
          pip install --break-system-packages \
            -r requirements.txt \
            -r sniff-web/requirements-web.txt \
            -r requirements-integration.txt
      - name: Run sniff-web backend tests
        working-directory: sniff-web
        run: pytest tests/integration_tests/ -v
      - name: Run pre-existing tests (regression check)
        # test_idempotency.py trước đây bị --ignore vì hai lý do: (a) fixture của
        # nó sinh flow volume=0 nên bị guard chống-dữ-liệu-giả của ClickHouseSink
        # loại sạch -> test fail thật; (b) nó cần ClickHouse sống mà runner không
        # có. (a) đã vá ở fixture; (b) giờ SKIP gọn thay vì ERROR. Nên không cần
        # loại cả file nữa — bỏ --ignore để phần idempotency thực sự được chạy
        # ngay khi môi trường có ClickHouse.
        run: pytest tests/integration_tests/ -v

  frontend-build:
    name: Frontend (node-${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sniff-web/web/package-lock.json
      - working-directory: sniff-web/web
        run: npm ci
      - working-directory: sniff-web/web
        run: npx tsc --noEmit
      - working-directory: sniff-web/web
        run: npm run build
      - working-directory: sniff-web/web
        run: npm test
