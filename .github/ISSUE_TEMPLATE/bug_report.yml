name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.0.0
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Python version, etc.
